name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.32.1'
  GO_VERSION: '1.25.x'
  CSC_IDENTITY_AUTO_DISCOVERY: 'false'

jobs:
  checks:
    name: Release checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/backend/go.sum

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download ffmpeg-static release binaries
        run: pnpm run release:download-ffmpeg-static:matrix

      - name: Run release checks
        run: pnpm run release:check

  package:
    name: Package ${{ matrix.name }}
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            os: macos-latest
            command: package:desktop:mac:arm64
            artifact: movscript-desktop-macos-arm64
            ffmpeg-platform: darwin
            ffmpeg-arch: arm64
          - name: macos-x64
            os: macos-latest
            command: package:desktop:mac:x64
            artifact: movscript-desktop-macos-x64
            ffmpeg-platform: darwin
            ffmpeg-arch: x64
          - name: linux-x64
            os: ubuntu-latest
            command: package:desktop:linux:x64
            artifact: movscript-desktop-linux-x64
            ffmpeg-platform: linux
            ffmpeg-arch: x64
          - name: linux-arm64
            os: ubuntu-latest
            command: package:desktop:linux:arm64
            artifact: movscript-desktop-linux-arm64
            ffmpeg-platform: linux
            ffmpeg-arch: arm64
          - name: windows-x64
            os: windows-latest
            command: package:desktop:win
            artifact: movscript-desktop-windows-x64
            ffmpeg-platform: win32
            ffmpeg-arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/backend/go.sum

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download ffmpeg-static release binary
        run: pnpm run release:download-ffmpeg-static -- --platform=${{ matrix.ffmpeg-platform }} --arch=${{ matrix.ffmpeg-arch }}

      - name: Build desktop package
        run: pnpm run ${{ matrix.command }}

      - name: Collect release artifacts
        run: pnpm run release:collect
        env:
          MOVSCRIPT_COLLECT_PLUGINS: '0'
          MOVSCRIPT_ARTIFACT_PREFIX: ${{ matrix.artifact }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release-artifacts/*
          if-no-files-found: error
          retention-days: 14

  plugins:
    name: Package plugins
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin packages
        run: pnpm run release:prepare-plugins

      - name: Collect plugin artifacts
        run: pnpm run release:collect

      - name: Upload plugin artifacts
        uses: actions/upload-artifact@v4
        with:
          name: movscript-plugins
          path: release-artifacts/*
          if-no-files-found: error
          retention-days: 14

  draft-release:
    name: Draft GitHub Release
    needs: [package, plugins]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts
          merge-multiple: true

      - name: Create combined checksums
        run: |
          find downloaded-artifacts -maxdepth 1 -type f -name '*SHA256SUMS.txt' -delete
          find downloaded-artifacts -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > downloaded-artifacts/SHA256SUMS.txt

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --draft --title "$RELEASE_TAG" --notes-file docs/release-draft-notes.md
          else
            gh release create "$RELEASE_TAG" --draft --title "$RELEASE_TAG" --notes-file docs/release-draft-notes.md
          fi
          gh release upload "$RELEASE_TAG" downloaded-artifacts/* --clobber
