appId: com.movscript.desktop
productName: Movscript
asar: true

directories:
  output: release
  buildResources: build

files:
  - out/**
  - package.json

extraResources:
  - from: ../../assets/logo.png
    to: logo.png
  - from: ../backend/bin
    to: backend
    filter:
      - server
      - server.exe
      - admin/**
  - from: movscript-agent
    to: movscript-agent
    filter:
      - dist/**
      - catalog/**
      - package.json
  - from: vendor/ffmpeg
    to: ffmpeg
    filter:
      - "**/*"

mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity

win:
  target:
    - nsis
    - portable

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
